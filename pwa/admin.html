<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoSpots — Admin Scrapers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 1.5rem;
        }

        a { color: #00d4ff; text-decoration: none; }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-title { color: #555; font-size: 0.9rem; }
        .header-right { display: flex; align-items: center; gap: 0.75rem; }
        #last-refresh { font-size: 0.78rem; color: #444; }
        #poll-indicator { font-size: 0.75rem; color: #f59e0b; display: none; }

        /* ── Buttons ── */
        .btn {
            background: rgba(0,212,255,0.10);
            border: 1px solid rgba(0,212,255,0.30);
            color: #00d4ff;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.15s;
        }
        .btn:hover { background: rgba(0,212,255,0.20); }
        .btn:disabled { opacity: 0.35; cursor: default; }

        .btn-run {
            background: rgba(34,197,94,0.10);
            border: 1px solid rgba(34,197,94,0.30);
            color: #22c55e;
            padding: 0.25rem 0.65rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.74rem;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .btn-run:hover { background: rgba(34,197,94,0.20); }
        .btn-run:disabled { opacity: 0.35; cursor: default; }
        .btn-run.reviews {
            background: rgba(123,47,247,0.10);
            border-color: rgba(123,47,247,0.35);
            color: #a78bfa;
        }
        .btn-run.reviews:hover { background: rgba(123,47,247,0.20); }
        .btn-run.queued {
            background: rgba(245,158,11,0.10);
            border-color: rgba(245,158,11,0.35);
            color: #f59e0b;
            cursor: default;
        }

        /* ── Stats bar ── */
        .stats-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-chip {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 0.45rem 0.9rem;
            font-size: 0.82rem;
        }
        .stat-chip span { color: #00d4ff; font-weight: 600; }

        /* ── Table ── */
        .table-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.07);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
        thead tr {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.09);
        }
        th {
            padding: 0.6rem 0.8rem;
            text-align: left;
            color: #666;
            font-weight: 500;
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: background 0.1s;
        }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody tr.expanded { background: rgba(0,212,255,0.04); }
        td { padding: 0.55rem 0.8rem; vertical-align: middle; }

        /* ── Health indicator ── */
        .health-cell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        .dot {
            display: inline-block;
            width: 9px; height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot.green  { background: #22c55e; box-shadow: 0 0 5px #22c55e55; }
        .dot.amber  { background: #f59e0b; box-shadow: 0 0 5px #f59e0b55; }
        .dot.red    { background: #ef4444; box-shadow: 0 0 5px #ef444455; }
        .dot.spin   { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .health-text { font-size: 0.79rem; }
        .health-text.green { color: #4ade80; }
        .health-text.amber { color: #fbbf24; }
        .health-text.red   { color: #f87171; }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            font-size: 0.68rem;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .badge-active   { background: rgba(34,197,94,0.12); color: #4ade80; }
        .badge-inactive { background: rgba(255,255,255,0.06); color: #555; }
        .badge-error    { background: rgba(239,68,68,0.12);  color: #f87171; }
        .badge-ok       { background: rgba(34,197,94,0.08);  color: #4ade80; }
        .badge-running  { background: rgba(245,158,11,0.12); color: #fbbf24; }
        .badge-pending  { background: rgba(245,158,11,0.08); color: #f59e0b; }
        .badge-reviews  { background: rgba(123,47,247,0.12); color: #a78bfa; }

        .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.78rem; }
        .dim  { color: #444; }
        .muted { color: #666; }

        /* ── Actions cell ── */
        .actions-cell {
            display: flex;
            gap: 0.35rem;
            align-items: center;
        }

        /* ── Detail panel ── */
        .detail-row td {
            padding: 0;
            background: #0c0c14;
            cursor: default;
        }
        .detail-row:hover { background: #0c0c14 !important; }
        .detail-inner {
            padding: 1.1rem 1.1rem 1.1rem 2.2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 0.85rem;
        }

        .detail-card {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 0.8rem 0.9rem;
        }
        .detail-card h4 {
            font-size: 0.69rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #444;
            margin-bottom: 0.55rem;
        }
        .kv { display: flex; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.28rem; font-size: 0.8rem; }
        .kv-key { color: #666; white-space: nowrap; }
        .kv-val { color: #ccc; text-align: right; word-break: break-word; }

        /* ── History ── */
        .history-card { grid-column: 1 / -1; }
        .hist-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; margin-top: 0.35rem; }
        .hist-table th { color: #444; font-weight: 500; text-align: left; padding: 0.22rem 0.45rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hist-table td { padding: 0.28rem 0.45rem; border-bottom: 1px solid rgba(255,255,255,0.03); color: #bbb; }
        .hist-table tr:last-child td { border-bottom: none; }

        /* ── Samples ── */
        .samples-card { grid-column: 1 / -1; }
        .sample-list { font-size: 0.77rem; margin-top: 0.35rem; }
        .sample-item {
            padding: 0.28rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            display: flex;
            gap: 0.8rem;
            align-items: center;
            color: #999;
        }
        .sample-item:last-child { border-bottom: none; }
        .sample-id { color: #00d4ff; font-family: monospace; min-width: 110px; font-size: 0.73rem; }

        /* ── Loading / empty ── */
        .loading { text-align: center; padding: 3rem; color: #444; }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(0,212,255,0.15);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-right: 0.45rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { text-align: center; padding: 2rem; color: #f87171; font-size: 0.88rem; }

        /* ── Toasts ── */
        #toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 380px;
        }
        .toast {
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.1);
            border-left-width: 4px;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: #e0e0e0;
            box-shadow: 0 4px 14px rgba(0,0,0,0.5);
            opacity: 1;
            transition: opacity 0.3s;
        }
        .toast.ok    { border-left-color: #22c55e; }
        .toast.err   { border-left-color: #ef4444; color: #f87171; }
        .toast.info  { border-left-color: #00d4ff; }
        .toast.warn  { border-left-color: #f59e0b; }
        .toast small { display: block; color: #777; font-size: 0.72rem; margin-top: 0.2rem; }

        /* ── Cron help ── */
        .cron-help {
            font-size: 0.72rem;
            color: #666;
            margin-top: 0.4rem;
            padding: 0.4rem 0.55rem;
            background: rgba(0,212,255,0.04);
            border-radius: 4px;
            font-family: monospace;
            border: 1px dashed rgba(0,212,255,0.2);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <span class="logo">GeoSpots</span>
        <span class="header-title">/ Admin Scrapers</span>
    </div>
    <div class="header-right">
        <span id="worker-status" title="Estado del scraper daemon"></span>
        <span id="poll-indicator">⟳ Actualizando automáticamente…</span>
        <span id="last-refresh"></span>
        <button class="btn" onclick="cleanupZombies()" title="Marca como zombie cualquier job 'running' colgado >Nh">🧹 Limpiar zombies</button>
        <button class="btn" id="btn-refresh" onclick="loadAll()">↻ Actualizar</button>
    </div>
</div>

<div id="toast-container"></div>

<div class="stats-bar" id="stats-bar"></div>
<div class="table-wrap" id="main-wrap">
    <div class="loading"><span class="spinner"></span> Cargando fuentes…</div>
</div>

<script>
const API_KEY = 'clave_secreta_inventada_por_ti_123';

const H = {
    get: async (url) => {
        const r = await fetch(url, { headers: { 'X-API-Key': API_KEY } });
        if (!r.ok) throw new Error(`GET ${url} → HTTP ${r.status}`);
        return r.json();
    },
    post: async (url) => {
        console.log('[admin] POST', url);
        const r = await fetch(url, { method: 'POST', headers: { 'X-API-Key': API_KEY } });
        const body = await r.text();
        let parsed;
        try { parsed = JSON.parse(body); } catch { parsed = { _raw: body }; }
        console.log('[admin] ←', r.status, parsed);
        if (!r.ok) {
            const msg = parsed.detail || parsed.error || parsed._raw || `HTTP ${r.status}`;
            throw new Error(`${r.status} — ${msg}`);
        }
        return parsed;
    },
};

// ─── toasts ────────────────────────────────────────────────────────────
function toast(title, detail, type='info', durationMs=5000) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div>${esc(title)}</div>${detail ? `<small>${esc(detail)}</small>` : ''}`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
    }, durationMs);
}

// ─── helpers ───────────────────────────────────────────────────────────
function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',year:'2-digit'})
         + ' ' + d.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
}
function daysSince(iso) {
    if (!iso) return null;
    return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
function fmtDuration(s) {
    if (s == null) return '—';
    if (s < 60) return `${s}s`;
    const m = Math.floor(s/60), sec = s%60;
    return sec > 0 ? `${m}m ${sec}s` : `${m}m`;
}
function fmtNum(n, zero) {
    if (n == null) return zero !== undefined ? zero : '—';
    return Number(n).toLocaleString('es-ES');
}
function statusBadge(st) {
    if (!st) return '<span class="dim">—</span>';
    const map = { ok: 'ok', ok_con_errores: 'error', error: 'error', running: 'running', pending: 'pending', done: 'ok' };
    return `<span class="badge badge-${map[st]||'ok'}">${st}</span>`;
}
function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function arr(a) { return (!a||!a.length) ? '—' : a.join(', '); }

// ─── state ─────────────────────────────────────────────────────────────
let allData = [];
const expanded = new Set();
const detailCache = {};
let pollTimer = null;

function hasPendingJobs() {
    // Auto-refresh si hay jobs en la cola O algún scraper en running (incluso
    // si fue lanzado por CLI fuera del panel).
    return allData.some(d =>
        (d.active_job_types && d.active_job_types.length > 0) ||
        d.ultimo_estado === 'running'
    );
}

async function refreshWorkerStatus() {
    const el = document.getElementById('worker-status');
    try {
        const w = await H.get('/admin/worker/status');
        if (w.alive) {
            el.innerHTML = `<span style="color:#4ade80">● Worker vivo</span> <span class="dim" style="font-size:0.72rem">(hace ${w.seconds_ago}s${w.pending_jobs?`, ${w.pending_jobs} en cola`:''})</span>`;
        } else if (w.last_heartbeat) {
            const min = Math.floor((w.seconds_ago || 0) / 60);
            el.innerHTML = `<span style="color:#f87171">● Worker muerto</span> <span class="dim" style="font-size:0.72rem">(último heartbeat hace ${min}min)</span>`;
        } else {
            el.innerHTML = `<span style="color:#f87171">● Worker no iniciado</span> <span class="dim" style="font-size:0.72rem">(reinicia el contenedor scraper)</span>`;
        }
    } catch(e) {
        el.innerHTML = '<span class="dim">worker?</span>';
    }
}

function schedulePoll() {
    clearTimeout(pollTimer);
    if (hasPendingJobs()) {
        document.getElementById('poll-indicator').style.display = 'inline';
        pollTimer = setTimeout(loadAll, 20000); // refresca en 20s si hay jobs activos
    } else {
        document.getElementById('poll-indicator').style.display = 'none';
    }
}

// ─── main load ─────────────────────────────────────────────────────────
async function loadAll() {
    clearTimeout(pollTimer);
    const btn = document.getElementById('btn-refresh');
    btn.disabled = true;
    btn.textContent = '↻ Cargando…';

    try {
        allData = await H.get('/admin/scrapers');
        renderStats(allData);
        renderTable(allData);
        refreshWorkerStatus();  // status del daemon en cabecera
        document.getElementById('last-refresh').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES');
        schedulePoll();
    } catch(e) {
        document.getElementById('main-wrap').innerHTML = `<div class="error-msg">Error: ${esc(e.message)}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = '↻ Actualizar';
    }
}

function renderStats(data) {
    const green = data.filter(d => d.salud==='green').length;
    const amber = data.filter(d => d.salud==='amber').length;
    const red   = data.filter(d => d.salud==='red').length;
    const totalRec = data.reduce((s,d)=>s+(d.total_records||0),0);
    const totalRev = data.reduce((s,d)=>s+(d.total_reviews||0),0);
    document.getElementById('stats-bar').innerHTML = `
        <div class="stat-chip">Fuentes <span>${data.length}</span></div>
        <div class="stat-chip"><span class="dot green" style="display:inline-block;vertical-align:middle;margin-right:4px"></span>Al día <span>${green}</span></div>
        <div class="stat-chip"><span class="dot amber" style="display:inline-block;vertical-align:middle;margin-right:4px"></span>Atención <span>${amber}</span></div>
        <div class="stat-chip"><span class="dot red" style="display:inline-block;vertical-align:middle;margin-right:4px"></span>Crítico <span>${red}</span></div>
        <div class="stat-chip">Source records <span>${fmtNum(totalRec)}</span></div>
        <div class="stat-chip">Reviews <span>${fmtNum(totalRev)}</span></div>
    `;
}

function renderTable(data) {
    if (!data.length) {
        document.getElementById('main-wrap').innerHTML = '<div class="loading">Sin fuentes</div>';
        return;
    }

    const rows = data.map((d, i) => {
        const isExp = expanded.has(d.nombre);
        const activeJobs = d.active_job_types || [];
        const spotsQueued   = activeJobs.includes('spots');
        const reviewsQueued = activeJobs.includes('reviews');

        // Botón spots
        const btnSpots = spotsQueued
            ? `<button class="btn-run queued" disabled onclick="event.stopPropagation()">⏳ Spots en cola</button>`
            : `<button class="btn-run" onclick="clickRun(event,'${esc(d.nombre)}','spots',${i})">▶ Spots</button>`;

        // Botón reviews (solo si la fuente los soporta)
        const btnReviews = d.has_reviews_support
            ? reviewsQueued
                ? `<button class="btn-run reviews queued" disabled onclick="event.stopPropagation()">⏳ Reviews en cola</button>`
                : `<button class="btn-run reviews" onclick="clickRun(event,'${esc(d.nombre)}','reviews',${i})">▶ Reviews</button>`
            : '';

        // Cron
        const cronTxt = d.cron_schedule
            ? `<span class="muted mono" style="font-size:0.72rem">${esc(d.cron_schedule)}</span>`
            : `<span class="dim" title="Sin programar — configurar en fuentes_config.cron_schedule">—</span>`;

        return `
        <tr onclick="toggleRow('${esc(d.nombre)}')" class="${isExp?'expanded':''}" id="row-${i}">
            <td>
                <div class="health-cell">
                    <span class="dot ${d.salud}${activeJobs.length?' spin':''}"></span>
                    <span class="health-text ${d.salud}">${esc(d.salud_texto||d.salud)}</span>
                </div>
            </td>
            <td>
                <div style="font-weight:500">${esc(d.display_name)}</div>
                <div class="mono muted" style="font-size:0.72rem">${esc(d.nombre)}</div>
            </td>
            <td>${d.activa
                ? '<span class="badge badge-active">activa</span>'
                : '<span class="badge badge-inactive">inactiva</span>'}
            </td>
            <td class="mono">${fmtNum(d.total_records, '0')}</td>
            <td class="mono">
                ${fmtNum(d.spots_total, '0')}
                ${(d.spots_exclusive||0)>0
                    ? `<span class="dim" style="font-size:0.7rem"> (${fmtNum(d.spots_exclusive)} excl.)</span>`
                    : ''}
            </td>
            <td class="mono">${fmtNum(d.total_reviews, '0')}</td>
            <td>${fmtDate(d.ultimo_fin)}</td>
            <td>${statusBadge(d.ultimo_estado)}</td>
            <td>${cronTxt}</td>
            <td>
                <div class="actions-cell">
                    ${btnSpots}
                    ${btnReviews}
                </div>
            </td>
        </tr>
        ${isExp ? `
        <tr class="detail-row" id="detail-row-${i}">
            <td colspan="10">
                <div class="detail-inner" id="detail-inner-${i}">
                    <div class="loading" style="padding:1.5rem"><span class="spinner"></span> Cargando…</div>
                </div>
            </td>
        </tr>` : ''}`;
    }).join('');

    document.getElementById('main-wrap').innerHTML = `
        <table>
            <thead><tr>
                <th>Estado de salud</th>
                <th>Fuente</th>
                <th>Activa</th>
                <th>Records</th>
                <th>Spots</th>
                <th>Reviews</th>
                <th>Último fin</th>
                <th>Resultado</th>
                <th>Cron</th>
                <th>Lanzar</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;

    // Re-cargar detalles de filas expandidas
    data.forEach((d, i) => { if (expanded.has(d.nombre)) loadDetail(d.nombre, i); });
}

function toggleRow(nombre) {
    if (expanded.has(nombre)) expanded.delete(nombre);
    else expanded.add(nombre);
    renderTable(allData);
    if (expanded.has(nombre)) {
        const i = allData.findIndex(d => d.nombre === nombre);
        if (i >= 0) loadDetail(nombre, i);
    }
}

async function loadDetail(nombre, idx) {
    const container = document.getElementById(`detail-inner-${idx}`);
    if (!container) return;
    try {
        const [detail, history, samples] = await Promise.all([
            detailCache[nombre] ? Promise.resolve(detailCache[nombre]) : H.get(`/admin/scrapers/${encodeURIComponent(nombre)}`),
            H.get(`/admin/scrapers/${encodeURIComponent(nombre)}/history?limit=10`),
            H.get(`/admin/scrapers/${encodeURIComponent(nombre)}/samples?limit=5`),
        ]);
        detailCache[nombre] = detail;
        if (document.getElementById(`detail-inner-${idx}`))
            document.getElementById(`detail-inner-${idx}`).innerHTML = renderDetail(detail, history, samples);
    } catch(e) {
        const c = document.getElementById(`detail-inner-${idx}`);
        if (c) c.innerHTML = `<div style="color:#f87171;padding:1rem">Error: ${esc(e.message)}</div>`;
    }
}

function renderDetail(d, history, samples) {
    const cred  = d.credibility || {};
    const stats = d.stats || {};
    const fc    = d.config || {};
    const lr    = d.last_run;
    const lrr   = d.last_reviews_run;

    const stale = stats.stale_records || 0;
    const huerf = stats.spots_fuentes_huerfano || 0;
    const cleanupBtn = huerf > 0
        ? `<button class="btn-run" style="margin-top:0.5rem;width:100%" onclick="cleanupFuentesHuerfanas('${esc(d.nombre)}')">🧹 Limpiar ${huerf} huérfanos de fuentes[]</button>`
        : '';
    const statsCard = `
        <div class="detail-card">
            <h4>Volumen</h4>
            <div class="kv"><span class="kv-key">Source records</span><span class="kv-val mono">${fmtNum(stats.active_records ?? stats.total_records,'0')}${stale>0?` <span class="dim" style="font-size:0.7rem">(+${fmtNum(stale)} stale)</span>`:''}</span></div>
            <div class="kv"><span class="kv-key">Spots con record activo</span><span class="kv-val mono">${fmtNum(stats.spots_total,'0')}</span></div>
            ${huerf>0?`<div class="kv"><span class="kv-key" style="color:#f87171">Spots huérfanos en fuentes[]</span><span class="kv-val mono" style="color:#f87171">${fmtNum(huerf)}</span></div>`:''}
            <div class="kv"><span class="kv-key">Exclusivos (solo esta fuente)</span><span class="kv-val mono">${fmtNum(stats.spots_exclusive,'0')}</span></div>
            <div class="kv"><span class="kv-key">Reviews totales</span><span class="kv-val mono">${fmtNum(stats.total_reviews,'0')}</span></div>
            ${cleanupBtn}
        </div>`;

    const credCard = `
        <div class="detail-card">
            <h4>Credibilidad</h4>
            <div class="kv"><span class="kv-key">base_score</span><span class="kv-val mono">${cred.base_score!=null?cred.base_score.toFixed(2):'—'}</span></div>
            <div class="kv"><span class="kv-key">review_quality</span><span class="kv-val mono">${cred.review_quality!=null?cred.review_quality.toFixed(2):'—'}</span></div>
            <div class="kv"><span class="kv-key">Cobertura</span><span class="kv-val">${arr(cred.coverage_region)}</span></div>
            ${cred.notes?`<div class="kv" style="margin-top:0.4rem"><span class="kv-key" style="font-size:0.72rem;color:#444">${esc(cred.notes)}</span></div>`:''}
        </div>`;

    const cronHelp = fc.cron_schedule
        ? ''
        : `<div class="cron-help">
            psql: UPDATE fuentes_config SET cron_schedule = '0 3 * * *'<br>
            WHERE nombre = '${esc(d.nombre)}';
           </div>`;

    const configCard = `
        <div class="detail-card">
            <h4>Configuración</h4>
            <div class="kv"><span class="kv-key">Activa</span><span class="kv-val">${fc.activa!=null?(fc.activa?'Sí':'No'):'—'}</span></div>
            <div class="kv"><span class="kv-key">Spots en config</span><span class="kv-val mono">${fmtNum(fc.spots_totales,'0')}</span></div>
            <div class="kv"><span class="kv-key">Cron schedule</span><span class="kv-val mono">${fc.cron_schedule?esc(fc.cron_schedule):'<span class="dim">sin programar</span>'}</span></div>
            ${fc.notas?`<div class="kv"><span class="kv-key">Notas</span><span class="kv-val dim" style="font-size:0.73rem">${esc(fc.notas)}</span></div>`:''}
            ${cronHelp}
        </div>`;

    const runCard = (run, title) => {
        if (!run) return `
            <div class="detail-card">
                <h4>${title}</h4>
                <div class="dim" style="margin-top:0.3rem;font-size:0.8rem">Sin ejecuciones registradas</div>
            </div>`;
        const errColor = (run.errores||0)>0 ? 'color:#f87171' : '';
        return `
        <div class="detail-card">
            <h4>${title}</h4>
            <div class="kv"><span class="kv-key">Estado</span><span class="kv-val">${statusBadge(run.estado)}</span></div>
            <div class="kv"><span class="kv-key">Inicio</span><span class="kv-val mono" style="font-size:0.73rem">${fmtDate(run.iniciado_en)}</span></div>
            <div class="kv"><span class="kv-key">Fin</span><span class="kv-val mono" style="font-size:0.73rem">${fmtDate(run.terminado_en)}</span></div>
            <div class="kv"><span class="kv-key">Duración</span><span class="kv-val mono">${fmtDuration(run.duration_s)}</span></div>
            <div class="kv"><span class="kv-key">Nuevos</span><span class="kv-val mono">${fmtNum(run.spots_nuevos,'0')}</span></div>
            <div class="kv"><span class="kv-key">Actualizados</span><span class="kv-val mono">${fmtNum(run.spots_actualizados,'0')}</span></div>
            <div class="kv"><span class="kv-key">Reviews nuevas</span><span class="kv-val mono">${fmtNum(run.reviews_nuevas,'0')}</span></div>
            <div class="kv"><span class="kv-key">Errores</span><span class="kv-val mono" style="${errColor}">${fmtNum(run.errores,'0')}</span></div>
        </div>`;
    };

    // Historial
    const histRows = history.map(h => {
        const isRev = h.fuente && h.fuente.endsWith('_reviews');
        const errStyle = (h.errores||0)>0 ? 'color:#f87171' : '';
        return `<tr>
            <td>${fmtDate(h.iniciado_en)}</td>
            <td>${isRev?'<span class="badge badge-reviews">reviews</span>':'<span class="badge badge-ok">spots</span>'}</td>
            <td>${statusBadge(h.estado)}</td>
            <td class="mono">${fmtDuration(h.duration_s)}</td>
            <td class="mono">${fmtNum(h.spots_nuevos,'0')}</td>
            <td class="mono">${fmtNum(h.spots_actualizados,'0')}</td>
            <td class="mono">${fmtNum(h.reviews_nuevas,'0')}</td>
            <td class="mono" style="${errStyle}">${fmtNum(h.errores,'0')}</td>
        </tr>`;
    }).join('');

    const histCard = `
        <div class="detail-card history-card">
            <h4>Historial (últimas 10 ejecuciones)</h4>
            ${history.length===0
                ? '<div class="dim" style="margin-top:0.35rem;font-size:0.8rem">Sin historial</div>'
                : `<table class="hist-table"><thead><tr>
                    <th>Fecha</th><th>Tipo</th><th>Resultado</th>
                    <th>Duración</th><th>Nuevos</th><th>Actualizados</th>
                    <th>Reviews</th><th>Errores</th>
                   </tr></thead><tbody>${histRows}</tbody></table>`}
        </div>`;

    // Muestras
    const sampleItems = samples.map(s => `
        <div class="sample-item">
            <span class="sample-id">${esc(s.source_id||'—')}</span>
            <span style="flex:1">${esc(s.nombre_canonico||'—')}</span>
            <span class="muted">${esc(s.tipo||'—')}</span>
            <span class="mono muted">${s.lat!=null?s.lat.toFixed(4):'?'}, ${s.lon!=null?s.lon.toFixed(4):'?'}</span>
            <span class="dim" style="font-size:0.71rem">${fmtDate(s.last_seen)}</span>
        </div>`).join('');

    const samplesCard = `
        <div class="detail-card samples-card">
            <h4>Últimos 5 source_records</h4>
            <div class="sample-list">
                ${samples.length===0
                    ? '<div class="dim" style="font-size:0.8rem">Sin registros</div>'
                    : sampleItems}
            </div>
        </div>`;

    return statsCard + credCard + configCard
         + runCard(lr, 'Última ejecución — Spots')
         + (lrr ? runCard(lrr, 'Última ejecución — Reviews') : '')
         + histCard + samplesCard;
}

// ─── lanzar job ────────────────────────────────────────────────────────
function clickRun(ev, nombre, jobType, rowIdx) {
    if (ev) { ev.stopPropagation(); ev.preventDefault(); }
    queueRun(nombre, jobType, rowIdx);
}

async function queueRun(nombre, jobType, rowIdx) {
    console.log(`[admin] Encolando job: ${nombre} / ${jobType}`);
    const btns = document.querySelectorAll(`#row-${rowIdx} .btn-run`);
    btns.forEach(b => { b.disabled = true; });

    // Pre-check: avisar si el worker no responde antes de encolar
    let workerAlive = true;
    try {
        const w = await H.get('/admin/worker/status');
        workerAlive = w.alive;
    } catch {}

    toast(`Encolando ${jobType}…`, nombre, 'info', 2500);

    try {
        const res = await H.post(`/admin/scrapers/${encodeURIComponent(nombre)}/run?job_type=${jobType}`);
        const subtitle = workerAlive
            ? `${nombre} (${jobType}) — el daemon lo procesará en <30s`
            : `${nombre} (${jobType}) — ⚠ daemon no responde: docker-compose restart scraper`;
        toast(`✓ Job #${res.job_id} en cola`, subtitle, workerAlive ? 'ok' : 'warn', 8000);
        const d = allData.find(x => x.nombre === nombre);
        if (d) {
            d.active_job_types = d.active_job_types || [];
            if (!d.active_job_types.includes(jobType)) d.active_job_types.push(jobType);
        }
        delete detailCache[nombre];
        renderTable(allData);
        schedulePoll();
    } catch(e) {
        console.error('[admin] queueRun failed:', e);
        toast(`✗ Falló al encolar ${jobType}`, `${nombre}: ${e.message}`, 'err', 9000);
        btns.forEach(b => { b.disabled = false; });
    }
}

// ─── cleanup zombies ───────────────────────────────────────────────────
async function cleanupZombies() {
    const hoursStr = prompt(
        "Marcar como zombie scraper_log/scraper_jobs colgados más de N horas en 'running':\n\n" +
        "• 12 (default, conservador): sólo los muy antiguos\n" +
        "• 6: agresivo, marca los recientes mostrados como 'Crash probable'\n" +
        "• 1: emergencia, para todo lo que no esté arrancando ahora\n",
        '12'
    );
    if (hoursStr == null) return;
    const hours = parseInt(hoursStr, 10);
    if (isNaN(hours) || hours < 1 || hours > 168) {
        toast('✗ Valor inválido', 'Debe ser un entero entre 1 y 168', 'err');
        return;
    }
    try {
        const r = await H.post(`/admin/cleanup/zombies?max_hours=${hours}`);
        toast(
            `✓ Limpieza zombies (umbral ${hours}h)`,
            `scraper_log: ${r.scraper_log_updated} filas · scraper_jobs: ${r.scraper_jobs_updated} filas`,
            'ok', 6000
        );
        loadAll();
    } catch(e) {
        toast('✗ Falló cleanup', e.message, 'err', 9000);
    }
}

async function cleanupFuentesHuerfanas(nombre) {
    if (!confirm(`Eliminar '${nombre}' de spots.fuentes[] donde no exista un source_record activo?\n\nEsto NO borra spots ni records — solo limpia el array para que los conteos cuadren.`)) return;
    try {
        const r = await H.post(`/admin/cleanup/fuentes-huerfanas?nombre=${encodeURIComponent(nombre)}`);
        toast('✓ Huérfanos limpiados', `${r.spots_actualizados} spots actualizados`, 'ok', 6000);
        delete detailCache[nombre];
        loadAll();
    } catch(e) {
        toast('✗ Falló cleanup', e.message, 'err', 9000);
    }
}

// ─── boot ──────────────────────────────────────────────────────────────
loadAll();
</script>
