# GeoSpots — Motor Geoespacial Semántico

networks:
  geospots_net:
    driver: bridge

services:
  db:
    build: ./db
    container_name: geospots-db
    restart: unless-stopped
    networks:
      - geospots_net
    ports:
      - "25433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - geospots-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  scraper:
    build: ./scraper
    container_name: geospots-scraper
    restart: unless-stopped
    networks:
      - geospots_net
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STAYFREE_AUTHORIZATION: ${STAYFREE_AUTHORIZATION}
      STAYFREE_API_TOKEN: ${STAYFREE_API_TOKEN}
      REQUEST_DELAY_SECONDS: 2
      MAX_WORKERS: 3
      LOG_LEVEL: INFO
    volumes:
      - geospots-logs:/app/logs
      - ./data:/data:ro
      - ./scraper:/app
      - ./enrichment:/app/enrichment:ro
      - ./jobs:/app/jobs:ro
      - ./stayfree_token.txt:/app/stayfree_token.txt:ro
    # IMPORTANTE: el contenedor es un DAEMON que procesa la cola scraper_jobs
    # cada 30s. NO arranca todos los scrapers automáticamente (eso causaba
    # crashes en cadena al reiniciar). Para ejecutar uno manualmente:
    #   docker-compose exec scraper python scheduler.py --park4night
    command: ["python", "scheduler.py", "--daemon"]

  enrichment:
    build: ./scraper
    container_name: geospots-enrichment
    restart: unless-stopped
    networks:
      - geospots_net
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ENRICHMENT_PROVIDER: ${ENRICHMENT_PROVIDER:-gemini}
      GEMINI_ENRICHMENT_MODEL: ${GEMINI_ENRICHMENT_MODEL:-gemini-2.5-flash-lite}
      DEEPSEEK_ENRICHMENT_MODEL: ${DEEPSEEK_ENRICHMENT_MODEL:-deepseek-v4-flash}
      REQUEST_DELAY_SECONDS: 2
      MAX_WORKERS: 3
      LOG_LEVEL: INFO
    volumes:
      - ./scraper:/app
      - ./enrichment:/app/enrichment
      - ./jobs:/app/jobs
    command: ["python", "-m", "enrichment.worker", "--batch-size", "1000"]

  # Servicio separado para Google Maps scraping vía Playwright.
  # Solo se arranca on-demand con --profile gmaps (no participa en `up -d`).
  # La imagen pesa ~700MB extra (Chromium + deps) — por eso aislada del scraper normal.
  gmaps:
    build:
      context: ./scraper
      dockerfile: Dockerfile.gmaps
    container_name: geospots-gmaps
    profiles: ["gmaps"]
    networks:
      - geospots_net
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAX_WORKERS: 1
      LOG_LEVEL: INFO
    volumes:
      - ./scraper:/app
      - ./enrichment:/app/enrichment:ro

  api:
    build: ./api
    container_name: geospots-api
    restart: unless-stopped
    networks:
      - geospots_net
    ports:
      - "18889:18889"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ENRICHMENT_PROVIDER: ${ENRICHMENT_PROVIDER:-gemini}
      GEMINI_ENRICHMENT_MODEL: ${GEMINI_ENRICHMENT_MODEL:-gemini-2.5-flash-lite}
      DEEPSEEK_ENRICHMENT_MODEL: ${DEEPSEEK_ENRICHMENT_MODEL:-deepseek-v4-flash}
      API_SECRET_KEY: ${API_SECRET_KEY}
      LOG_LEVEL: INFO
    volumes:
      - ./pwa:/pwa
      - ./api:/app
      - ./enrichment:/app/enrichment:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18889/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  geospots-pgdata:
  geospots-logs:
